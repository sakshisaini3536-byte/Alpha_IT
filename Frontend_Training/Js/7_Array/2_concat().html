<!-- 2. concat() – Merge Arrays

👉 Joins two (or more) arrays into a new one.
Real Life Example: Joining boys’ team and girls’ team. -->
<!DOCTYPE html>
<html>
<body>
<h2>Concat Example</h2>
<p id="demo"></p>

<script>
const girls = ["Anita", "Lara"];
const boys = ["Ravi", "Aman"];
const team1 =["Sara", "Mike"];

const team = girls.concat(boys, team1);

document.getElementById("demo").innerHTML = "Final Team: " + team;
</script>
</body>
</html>

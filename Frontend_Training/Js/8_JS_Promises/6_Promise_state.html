<!-- 🔹 What is a Promise?

👉 A Promise is like a contract between you and JavaScript:

Producing code = the work being done (can take time, like fetching data, waiting for a timer, downloading a file).

Consuming code = the code that needs the result (but must wait).

So a Promise links both:

✅ If success → resolves (calls resolve)

❌ If failure → rejects (calls reject)
🔹 Promise States

A Promise can be in 3 states:

Pending → still working

Fulfilled → finished successfully (resolve called)

Rejected → failed (reject called)
🔹 Real-Life Analogy

Think of ordering food online 🍔:

You order → Promise is pending

Food delivered → Promise is fulfilled ✅

Restaurant cancels → Promise is rejected ❌ -->

<!-- 🔹 Basic Example  -->

<!DOCTYPE html>
<html>
<body>
<h2>JavaScript Promises</h2>
<p id="demo"></p>

<script>
function myDisplayer(some) {
  document.getElementById("demo").innerHTML = some;
}

// Create a Promise
let myPromise = new Promise(function ( myResolve,myReject) {
  let x = 0;

  if (x === 1) {
    myResolve("Order Delivered ✅");  // success
  } else {
    myReject("Order Failed ❌");  // failure
  }
  //myPromise = Order Delivered ✅
  console.log(myPromise)
});


// Use the Promise
myPromise.then(
  function(value) { myDisplayer(value); },   // success case (1)
  function(error) { myDisplayer(error); } , // error case (2)
  console.log(myPromise)
);
</script>
</body>
</html>

<!-- 👉 Here, the Promise checks a condition (x == 0).

If yes → success (resolve)

If no → error (reject) -->
